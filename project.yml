name: cmux_iOS
options:
  bundleIdPrefix: com.cmuxterm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.1.0
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: 0.9.0

targets:
  cmux_iOS:
    type: application
    platform: iOS
    sources:
      - Sources/cmux_iOS
      - cmux_iOS
    settings:
      base:
        INFOPLIST_FILE: cmux_iOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cmuxterm.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: cmux_iOS/cmux_iOS.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: SwiftTerm
      - package: Citadel

  cmux_iOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/cmux_iOSTests
    dependencies:
      - target: cmux_iOS

schemes:
  cmux_iOS:
    build:
      targets:
        cmux_iOS: all
        cmux_iOSTests: [test]
    run:
      config: Debug
    test:
      targets:
        - cmux_iOSTests
    archive:
      config: Release
